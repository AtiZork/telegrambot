<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Divergence Alerts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a30;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #a78bfa;
      --accent-dim: #7c3aed;
      --ok: #22c55e;
      --warn: #eab308;
      --err: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 520px; margin: 0 auto; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 1rem 0;
      color: var(--accent);
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.6rem 0.75rem;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .row { display: flex; gap: 0.75rem; }
    .row > * { flex: 1; }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: var(--accent-dim); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); background: rgba(167,139,250,0.1); }
    .form-actions { margin-top: 1rem; }
    .result {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .result.ok { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); }
    .result.err { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); }
    .result.info { background: rgba(167,139,250,0.1); border: 1px solid var(--border); }
    .health-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .health-item {
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .health-item .k { color: var(--muted); }
    .health-item .v.ok { color: var(--ok); }
    .health-item .v.warn { color: var(--warn); }
    .health-item .v.err { color: var(--err); }
    .foot { text-align: center; margin-top: 2rem; color: var(--muted); font-size: 0.8rem; }
    .foot a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Divergence Alerts</h1>
    <p class="subtitle">Event A vs Market B — register users and set thresholds.</p>

    <section>
      <h2>Health</h2>
      <button type="button" class="btn-ghost" id="healthBtn">Check health</button>
      <div id="healthResult" class="result info" style="display:none; margin-top: 1rem;"></div>
    </section>

    <section>
      <h2>Register user</h2>
      <label for="regTelegramId">Telegram ID</label>
      <input type="number" id="regTelegramId" placeholder="e.g. 1573486677" />
      <label for="regUsername" style="margin-top: 0.75rem;">Username (optional)</label>
      <input type="text" id="regUsername" placeholder="e.g. @myname" />
      <div class="form-actions">
        <button type="button" id="registerBtn">Register</button>
      </div>
      <div id="registerResult" class="result info" style="display:none; margin-top: 1rem;"></div>
    </section>

    <section>
      <h2>Update thresholds</h2>
      <label for="thrUserId">User ID</label>
      <input type="number" id="thrUserId" placeholder="e.g. 1" />
      <div class="row" style="margin-top: 0.75rem;">
        <div>
          <label for="thrOpen">Open threshold</label>
          <input type="number" id="thrOpen" step="any" placeholder="0.05" />
        </div>
        <div>
          <label for="thrClose">Close threshold</label>
          <input type="number" id="thrClose" step="any" placeholder="0.02" />
        </div>
      </div>
      <label for="thrCooldown" style="margin-top: 0.75rem;">Cooldown (minutes)</label>
      <input type="number" id="thrCooldown" placeholder="5" min="0" />
      <div class="form-actions">
        <button type="button" id="thresholdsBtn">Update thresholds</button>
      </div>
      <div id="thresholdsResult" class="result info" style="display:none; margin-top: 1rem;"></div>
    </section>

    <p class="foot"><a href="/docs">API docs</a> · <a href="/api/health">/api/health</a></p>
  </div>

  <script>
    const base = window.location.origin;

    function showResult(el, content, type) {
      el.style.display = 'block';
      el.className = 'result ' + (type || 'info');
      el.textContent = content;
    }

    document.getElementById('healthBtn').addEventListener('click', async () => {
      const el = document.getElementById('healthResult');
      try {
        const r = await fetch(base + '/api/health');
        const d = await r.json();
        const ok = d.status === 'ok';
        showResult(el,
          'Status: ' + d.status + '\nDatabase: ' + d.database + '\nConfig loaded: ' + d.config_loaded,
          ok ? 'ok' : 'err'
        );
      } catch (e) {
        showResult(el, 'Error: ' + e.message, 'err');
      }
    });

    document.getElementById('registerBtn').addEventListener('click', async () => {
      const el = document.getElementById('registerResult');
      const telegramId = document.getElementById('regTelegramId').value.trim();
      const username = document.getElementById('regUsername').value.trim() || undefined;
      if (!telegramId) {
        showResult(el, 'Enter Telegram ID.', 'err');
        return;
      }
      try {
        const r = await fetch(base + '/api/users/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ telegram_id: parseInt(telegramId, 10), username: username || null }),
        });
        const d = await r.json();
        if (!r.ok) {
          showResult(el, (d.detail || JSON.stringify(d)).toString(), 'err');
          return;
        }
        showResult(el, 'User ID: ' + d.user_id + '\nTelegram ID: ' + d.telegram_id + '\n' + d.message, 'ok');
        document.getElementById('thrUserId').value = d.user_id;
      } catch (e) {
        showResult(el, 'Error: ' + e.message, 'err');
      }
    });

    document.getElementById('thresholdsBtn').addEventListener('click', async () => {
      const el = document.getElementById('thresholdsResult');
      const userId = document.getElementById('thrUserId').value.trim();
      if (!userId) {
        showResult(el, 'Enter User ID.', 'err');
        return;
      }
      const open = document.getElementById('thrOpen').value.trim();
      const close = document.getElementById('thrClose').value.trim();
      const cooldown = document.getElementById('thrCooldown').value.trim();
      const body = {};
      if (open !== '') body.open_threshold = parseFloat(open);
      if (close !== '') body.close_threshold = parseFloat(close);
      if (cooldown !== '') body.cooldown_minutes = parseInt(cooldown, 10);
      if (Object.keys(body).length === 0) {
        showResult(el, 'Fill at least one threshold field.', 'err');
        return;
      }
      try {
        const r = await fetch(base + '/api/users/' + userId + '/thresholds', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const d = await r.json();
        if (!r.ok) {
          showResult(el, (d.detail || JSON.stringify(d)).toString(), 'err');
          return;
        }
        showResult(el, d.message || 'Thresholds updated.', 'ok');
      } catch (e) {
        showResult(el, 'Error: ' + e.message, 'err');
      }
    });
  </script>
</body>
</html>
